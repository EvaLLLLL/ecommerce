spring.application.name=product-service
server.port=8080
# KV database URL — products instance (high read / low write)
# Production: configure as Leader-Follower W=5 R=1 for strong write + fast reads
kv.database.url=${KV_DATABASE_URL:http://localhost:8084}
# Fault injection rate for ATW demo (Assignment 3).
# 0.0 = healthy (default). Set FAULT_RATE=0.5 to make this instance return 503
# on 50% of requests so ALB Automatic Target Weights can be demonstrated.
product.fault.rate=${FAULT_RATE:0.0}
product.bad-instance-chance=${BAD_INSTANCE_CHANCE:0.0}
