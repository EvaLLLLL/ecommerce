spring.application.name=shopping-cart-service
server.port=8082

# Downstream service URLs — override via environment variables
product.service.url=${PRODUCT_SERVICE_URL:http://localhost:8080}
warehouse.service.url=${WAREHOUSE_SERVICE_URL:http://localhost:8083}
cca.service.url=${CCA_SERVICE_URL:http://localhost:8081}
kv.database.url=${KV_DATABASE_URL:http://localhost:8084}

# RabbitMQ connection
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
# Required for publisher confirms in RabbitTemplate
spring.rabbitmq.publisher-confirm-type=correlated

# Must match the queue name declared in the Warehouse Service
warehouse.queue.name=${WAREHOUSE_QUEUE_NAME:warehouse.ship.queue}

# Keep platform health checks focused on process liveness instead of downstream dependencies.
management.health.rabbit.enabled=false
