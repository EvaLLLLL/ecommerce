spring.application.name=kv-database
server.port=${KV_DATABASE_PORT:8084}

# Node role: leader, follower, or leaderless
kv.role=${ROLE:leader}

# Replication — override via environment variables
kv.follower-urls=${FOLLOWER_URLS:}
kv.peer-urls=${PEER_URLS:}
kv.write-quorum-size=${WRITE_QUORUM_SIZE:1}
kv.read-quorum-size=${READ_QUORUM_SIZE:1}
kv.node-self-url=${NODE_SELF_URL:http://localhost:8084}
