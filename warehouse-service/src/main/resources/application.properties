spring.application.name=warehouse-service
server.port=8083

# RabbitMQ connection â€” override via environment variables
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

warehouse.consumer-count=${WAREHOUSE_CONSUMER_COUNT:16}
warehouse.max-consumer-count=${WAREHOUSE_MAX_CONSUMER_COUNT:64}
warehouse.prefetch-count=${WAREHOUSE_PREFETCH_COUNT:10}

# Queue name must match the name used by the Shopping Cart Service publisher
warehouse.queue.name=${WAREHOUSE_QUEUE_NAME:warehouse.ship.queue}
warehouse.listener.auto-startup=${WAREHOUSE_LISTENER_AUTO_STARTUP:true}
